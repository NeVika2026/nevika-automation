<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Документы и доверие FAMALL</title>
  <desc id="desc">Фирменная обложка FAMALL для новости о документах компании и документах производителя.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.62" stop-color="#fff8f9"/>
      <stop offset="1" stop-color="#f5f6f8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#202124" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1600" height="900" rx="42" fill="url(#bg)"/>
  <circle cx="1280" cy="150" r="260" fill="#ff2942" opacity="0.08"/>
  <circle cx="190" cy="760" r="145" fill="#ff2942" opacity="0.06"/>
  <g transform="translate(112 106)">
    <rect x="0" y="0" width="238" height="112" rx="34" fill="#fff" filter="url(#shadow)"/>
    <rect x="34" y="34" width="58" height="44" rx="8" fill="none" stroke="#ff2942" stroke-width="8"/>
    <path d="M34 44 64 18 94 44" fill="none" stroke="#ff2942" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M54 76h20" stroke="#ff2942" stroke-width="8" stroke-linecap="round"/>
    <text x="112" y="70" fill="#ff2942" font-family="Arial, sans-serif" font-size="34" font-weight="800" letter-spacing="6">FAMALL</text>
  </g>
  <g transform="translate(112 292)">
    <text x="0" y="0" fill="#202124" font-family="Arial, sans-serif" font-size="86" font-weight="900">Документы</text>
    <text x="0" y="94" fill="#ff2942" font-family="Arial, sans-serif" font-size="86" font-weight="900">и доверие</text>
    <text x="0" y="166" fill="#676b76" font-family="Arial, sans-serif" font-size="34" font-weight="700">ООО «ФАМАЛЛ» и документы производителя</text>
    <text x="0" y="226" fill="#676b76" font-family="Arial, sans-serif" font-size="30" font-weight="700">Актуальность документов уточняйте у консультанта</text>
  </g>
  <g transform="translate(910 214)" filter="url(#shadow)">
    <rect x="0" y="0" width="430" height="540" rx="34" fill="#fff"/>
    <rect x="52" y="70" width="326" height="54" rx="12" fill="#fff0f3"/>
    <rect x="52" y="158" width="260" height="18" rx="9" fill="#dadde3"/>
    <rect x="52" y="200" width="308" height="18" rx="9" fill="#dadde3"/>
    <rect x="52" y="242" width="224" height="18" rx="9" fill="#dadde3"/>
    <rect x="52" y="340" width="118" height="118" rx="24" fill="#fff0f3" stroke="#ff2942" stroke-width="7"/>
    <path d="m80 396 33 34 54-76" fill="none" stroke="#ff2942" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="190" y="398" fill="#202124" font-family="Arial, sans-serif" font-size="34" font-weight="900">Проверка</text>
    <text x="190" y="438" fill="#676b76" font-family="Arial, sans-serif" font-size="24" font-weight="700">перед покупкой</text>
  </g>
  <rect x="112" y="714" width="566" height="72" rx="36" fill="#fff" stroke="#ffd0d8"/>
  <text x="148" y="762" fill="#ff2942" font-family="Arial, sans-serif" font-size="28" font-weight="900">Документы производителя</text>
</svg>
