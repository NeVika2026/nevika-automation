<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Реферальная акция FAMALL</title>
  <desc id="desc">Фирменная обложка FAMALL: приведи друга, бонус 5 000 рублей по условиям программы до 31 июля 2026 года.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.58" stop-color="#fff7f8"/>
      <stop offset="1" stop-color="#ffe6eb"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff2942"/>
      <stop offset="1" stop-color="#ff6f82"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#202124" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1600" height="900" rx="42" fill="url(#bg)"/>
  <circle cx="1240" cy="160" r="280" fill="#ff2942" opacity="0.08"/>
  <circle cx="210" cy="790" r="160" fill="#ff2942" opacity="0.07"/>
  <g transform="translate(110 104)">
    <rect x="0" y="0" width="238" height="112" rx="34" fill="#fff" filter="url(#shadow)"/>
    <rect x="34" y="34" width="58" height="44" rx="8" fill="none" stroke="#ff2942" stroke-width="8"/>
    <path d="M34 44 64 18 94 44" fill="none" stroke="#ff2942" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M54 76h20" stroke="#ff2942" stroke-width="8" stroke-linecap="round"/>
    <text x="112" y="70" fill="#ff2942" font-family="Arial, sans-serif" font-size="34" font-weight="800" letter-spacing="6">FAMALL</text>
  </g>
  <g transform="translate(110 274)">
    <text x="0" y="0" fill="#202124" font-family="Arial, sans-serif" font-size="76" font-weight="900">Реферальная акция</text>
    <text x="0" y="94" fill="#ff2942" font-family="Arial, sans-serif" font-size="96" font-weight="900">5 000 ₽</text>
    <text x="0" y="158" fill="#676b76" font-family="Arial, sans-serif" font-size="34" font-weight="700">Бонус по условиям программы</text>
    <text x="0" y="218" fill="#676b76" font-family="Arial, sans-serif" font-size="34" font-weight="700">Акция действует до 31 июля 2026 года</text>
  </g>
  <g transform="translate(930 270)" filter="url(#shadow)">
    <rect x="0" y="0" width="440" height="300" rx="36" fill="#fff"/>
    <circle cx="130" cy="112" r="58" fill="#fff0f3" stroke="#ff2942" stroke-width="7"/>
    <circle cx="310" cy="112" r="58" fill="#fff0f3" stroke="#ff2942" stroke-width="7"/>
    <path d="M188 112H252" stroke="#ff2942" stroke-width="8" stroke-linecap="round"/>
    <path d="m240 88 28 24-28 24" fill="none" stroke="#ff2942" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="90" y="212" fill="#202124" font-family="Arial, sans-serif" font-size="34" font-weight="900">Порекомендуйте</text>
    <text x="110" y="256" fill="#676b76" font-family="Arial, sans-serif" font-size="26" font-weight="700">условия уточняйте</text>
  </g>
  <rect x="108" y="714" width="620" height="72" rx="36" fill="#fff" stroke="#ffd0d8"/>
  <text x="144" y="762" fill="#ff2942" font-family="Arial, sans-serif" font-size="28" font-weight="900">Приведи друга — получи 5 000 ₽</text>
</svg>
